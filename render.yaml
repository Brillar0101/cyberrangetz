databases:
  - name: cyberrange-db
    plan: free
    databaseName: cyberrange
    user: cyberrange

services:
  # Backend API (waitlist only)
  - type: web
    name: cyberrange-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install --omit=optional
    startCommand: node waitlist-server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cyberrange-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://cyberrangetz.com
      - key: BREVO_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: noreply@cyberrangetz.com

  # Frontend (static site)
  - type: web
    name: cyberrange-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://cyberrange-api.onrender.com
